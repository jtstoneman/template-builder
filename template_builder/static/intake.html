<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>New matter</title>
<style>
  /* zellige & glass — matches the firm-side app (see index.html) */
  :root { --ink:#2b2015; --muted:#857057; --accent:#0e6b5e;
          --terra:#a84a26; --terra-2:#c2653a; --saffron:#c98d24;
          --line:rgba(122, 83, 45, 0.22); }
  * { box-sizing: border-box; }
  body { margin:0; background:#f2e7d5; color:var(--ink);
         font:15px/1.55 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", sans-serif; }
  body::before {
    content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
    background:
      radial-gradient(800px 560px at 8% -10%, rgba(207, 112, 64, 0.18), transparent 62%),
      radial-gradient(700px 540px at 100% 12%, rgba(14, 107, 94, 0.13), transparent 62%),
      radial-gradient(640px 480px at 50% 112%, rgba(217, 154, 43, 0.15), transparent 62%),
      linear-gradient(180deg, #f5ecdd, #efe3cf);
  }
  body::after {
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:0.06;
    background-image:url('data:image/svg+xml;utf8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2296%22 height=%2296%22 viewBox=%220 0 96 96%22%3E%3Cg fill=%22none%22 stroke=%22%23875022%22 stroke-width=%221%22%3E%3Cpath d=%22M48 10 L86 48 L48 86 L10 48 Z%22/%3E%3Crect x=%2221.1%22 y=%2221.1%22 width=%2253.8%22 height=%2253.8%22/%3E%3Ccircle cx=%2248%22 cy=%2248%22 r=%226.5%22/%3E%3Ccircle cx=%220%22 cy=%220%22 r=%229%22/%3E%3Ccircle cx=%2296%22 cy=%220%22 r=%229%22/%3E%3Ccircle cx=%220%22 cy=%2296%22 r=%229%22/%3E%3Ccircle cx=%2296%22 cy=%2296%22 r=%229%22/%3E%3C/g%3E%3C/svg%3E');
    background-size:96px 96px;
  }
  ::selection { background:rgba(207, 112, 64, 0.32); }
  main { max-width:640px; margin:0 auto; padding:40px 22px 80px; }
  h1 { font-size:21px; font-weight:700; letter-spacing:-0.02em; }
  h1::before { content:"✦"; color:var(--saffron); margin-right:9px; font-size:17px; }
  p.lead { color:var(--muted); font-size:14px; }
  .card {
    background:rgba(255, 252, 246, 0.74); border:1px solid rgba(255, 255, 255, 0.5);
    border-radius:12px; padding:22px 24px; margin-top:18px;
    -webkit-backdrop-filter:saturate(1.4) blur(16px); backdrop-filter:saturate(1.4) blur(16px);
    box-shadow: 0 1px 1px rgba(74, 44, 16, 0.05), 0 10px 24px -14px rgba(74, 44, 16, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.65);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .card { background:#fdf8ee; }
  }
  label { display:block; font-size:13px; margin:14px 0 4px; }
  label .name { font-family:ui-monospace, Menlo, monospace; font-size:11px; color:var(--muted); }
  input[type=text], input[type=number], select {
    width:100%; font:inherit; font-size:13.5px; padding:7px 11px;
    border:1px solid var(--line); border-radius:8px; background:rgba(255, 255, 255, 0.72);
    color:var(--ink); transition:border-color 0.2s, box-shadow 0.2s; }
  input:focus, select:focus { outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(14, 107, 94, 0.16); }
  .bool { display:flex; gap:9px; align-items:flex-start; margin:14px 0 4px; }
  .bool input { margin-top:3px; accent-color:var(--accent); }
  .bool label { margin:0; }
  button { font:inherit; font-size:14px; font-weight:600; width:100%; margin-top:22px; padding:10px;
           border-radius:9px; border:1px solid rgba(125, 50, 20, 0.6);
           background:linear-gradient(180deg, var(--terra-2), var(--terra)); color:#fff9ef;
           cursor:pointer;
           box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 4px 10px -4px rgba(168, 74, 38, 0.5);
           transition:transform 0.12s, filter 0.2s; }
  button:hover { filter:brightness(1.07); }
  button:active { transform:scale(0.98); }
  button:disabled { opacity:0.45; transform:none; }
  .notice { border-radius:10px; padding:10px 15px; font-size:13.5px; margin-top:16px;
            border:1px solid transparent; display:none; }
  .notice.err { background:rgba(168, 74, 38, 0.12); color:#8c3316;
                border-color:rgba(168, 74, 38, 0.3); display:block; }
  .notice.ok { background:rgba(14, 107, 94, 0.13); color:#0b5a4e;
               border-color:rgba(14, 107, 94, 0.3); display:block; }
</style>
</head>
<body>
<main>
  <h1 id="title">New matter</h1>
  <p class="lead">Answer the questionnaire below. A draft goes to the legal team;
     anything unusual is routed to a lawyer automatically.</p>
  <div class="card">
    <label>Your organisation / matter reference</label>
    <input type="text" id="counterparty" placeholder="e.g. Halloway Marine Systems">
    <form id="q"></form>
    <button id="submit" disabled>Submit</button>
    <div class="notice" id="notice"></div>
  </div>
</main>
<script>
"use strict";
const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
const templateName = decodeURIComponent(location.pathname.split("/").pop());
let variables = [];

async function init() {
  // the questionnaire-only endpoint: this page faces the counterparty and
  // must never receive the firm's variants/conditions/provenance
  const res = await fetch(`/api/intake/${encodeURIComponent(templateName)}`);
  if (!res.ok) { notice("err", "This intake link is not valid."); return; }
  const t = await res.json();
  document.getElementById("title").textContent = t.doc_type + " — new matter";
  document.title = t.doc_type + " intake";
  variables = t.variables;
  const form = document.getElementById("q");
  for (const v of variables) {
    const name = esc(v.name);  // LLM-derived: escaped like everything else
    if (v.type === "boolean") {
      form.insertAdjacentHTML("beforeend", `
        <div class="bool"><input type="checkbox" id="q-${name}">
        <label for="q-${name}">${esc(v.question)} <span class="name">${name}</span></label></div>`);
    } else if (v.type === "choice") {
      form.insertAdjacentHTML("beforeend", `
        <label for="q-${name}">${esc(v.question)} <span class="name">${name}</span></label>
        <select id="q-${name}"><option value="">—</option>
          ${v.choices.map((c) => `<option>${esc(c)}</option>`).join("")}</select>`);
    } else {
      form.insertAdjacentHTML("beforeend", `
        <label for="q-${name}">${esc(v.question)} <span class="name">${name}</span></label>
        <input type="${v.type === "number" ? "number" : "text"}" id="q-${name}" step="any">`);
    }
  }
  document.getElementById("submit").disabled = false;
}

function notice(kind, text) {
  const el = document.getElementById("notice");
  el.className = `notice ${kind}`;
  el.textContent = text;
}

document.getElementById("submit").addEventListener("click", async () => {
  const counterparty = document.getElementById("counterparty").value.trim();
  if (!counterparty) { notice("err", "Please give your organisation / reference."); return; }
  const answers = {}, missing = [];
  for (const v of variables) {
    const el = document.getElementById(`q-${v.name}`);
    if (v.type === "boolean") answers[v.name] = el.checked;
    else if (el.value === "") missing.push(v.question);
    else answers[v.name] = v.type === "number" ? Number(el.value) : el.value;
  }
  if (missing.length) { notice("err", `Please answer: ${missing[0]}`); return; }
  const id = `${templateName}-${counterparty.toLowerCase().replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "").slice(0, 24)}-${new Date().toISOString().slice(0, 10)}`;
  const button = document.getElementById("submit");
  button.disabled = true;  // a double-click must not race two submissions
  let res;
  try {
    res = await fetch("/api/matters", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, template: templateName, counterparty, answers,
                             status: "intake" }),
    });
  } catch {
    button.disabled = false;
    notice("err", "Could not reach the server — please try again.");
    return;
  }
  if (!res.ok) {
    const detail = await res.json().then((b) => b.detail).catch(() => res.statusText);
    button.disabled = false;
    if (res.status === 409) {
      notice("err", "A matter with this reference already exists today — the legal "
                    + "team already has it. Add a distinguishing reference if this "
                    + "is a different matter.");
    } else {
      notice("err", String(detail));
    }
    return;
  }
  document.getElementById("q").style.display = "none";
  button.style.display = "none";
  notice("ok", `Thank you — your matter reference is ${id}. The legal team has your draft.`);
});

init();
</script>
</body>
</html>
